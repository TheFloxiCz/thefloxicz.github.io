<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Kurzu - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; /* Deep blue-black */
            --card: #111b2d; /* Slightly lighter card background */
            --text: #f8fafc;
            --accent: #38bdf8; /* Vibrant blue */
            --gradient-1: #38bdf8;
            --gradient-2: #8b5cf6; /* Purple for depth */
            --low: #fb7185;
            --high: #4ade80;
            --low-dim: #991b1b;
            --high-dim: #166534;
            --card-border: rgba(56, 189, 248, 0.2);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        header h1 {
            font-size: 1.1rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-weight: 400;
        }
        header .time-full {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
        }
        header span.live-icon {
            color: var(--accent);
            animation: pulse 2s infinite;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }
        .card:hover { border-color: var(--card-border); }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2));
            border-radius: 20px 20px 0 0;
        }
        .card.stat-low::before { background: var(--low); }
        .card.stat-high::before { background: var(--high); }

        .price-card { padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .price-card .stat-label { font-size: 1.1rem; color: #94a3b8; letter-spacing: 1px; }
        .price-card .price-main { font-size: 6rem; font-weight: 800; margin: 15px 0; line-height: 1; }
        .price-card .trend-indicator { font-size: 1.2rem; font-weight: 600; color: #4ade80; }

        .stats-grid { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        .stat-card { padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .stat-card .stat-label { font-size: 0.9rem; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
        .stat-card .stat-value { font-size: 2.8rem; font-weight: 600; }
        .stat-card.low .stat-value { color: var(--low); }
        .stat-card.high .stat-value { color: var(--high); }
        .stat-card .stat-subtext { font-size: 0.8rem; color: #64748b; }

        .controls-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        .controls { display: flex; gap: 8px; }
        button {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        button:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent); border-color: rgba(56, 189, 248, 0.2); }
        button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .settings-btn { color: #64748b; background: none; border: none; font-size: 1.3rem; padding: 0; cursor: pointer; }
        .settings-btn:hover { color: var(--accent); }

        .chart-card { padding: 30px; margin-top: 10px; }
        .chart-container { position: relative; height: 500px; width: 100%; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Monitoring Kurzu - Dashboard</h1>
            <div class="time-full" id="current-time">NAČÍTÁNÍ...</div>
        </div>
        <div style="font-size: 1.1rem; color: #64748b;"><span class="live-icon">●</span> LIVE UPDATE</div>
    </header>

    <div class="dashboard">
        <div class="card price-card">
            <div class="stat-label">AKTUÁLNÍ KURZ</div>
            <div class="price-main" id="last-price">0 CZK</div>
            <div class="trend-indicator" id="last-event-label">Čekám na data...</div>
        </div>
        <div class="stats-grid">
            <div class="card stat-card high stat-high">
                <div class="stat-label">MAX (24H)</div>
                <div class="stat-value" id="high-24h">0 CZK</div>
                <div class="stat-subtext">za posl. 12 záznamů</div>
            </div>
            <div class="card stat-card low stat-low">
                <div class="stat-label">MIN (24H)</div>
                <div class="stat-value" id="low-24h">0 CZK</div>
                <div class="stat-subtext">za posl. 12 záznamů</div>
            </div>
        </div>
    </div>

    <div class="controls-row">
        <div class="controls">
            <button onclick="updateChart('24h')" id="btn-24h">24H</button>
            <button onclick="updateChart('7d')" id="btn-7d">7D</button>
            <button onclick="updateChart('30d')" id="btn-30d">30D</button>
            <button onclick="updateChart('all')" class="active" id="btn-all">VŠE</button>
        </div>
        <button class="settings-btn" id="btn-settings">⚙</button>
    </div>

    <div class="card chart-card">
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let chart;
    const ctx = document.getElementById('priceChart').getContext('2d');

    // NAČÍTÁNÍ DAT ZE SOUBORU
    async function loadCSV() {
        try {
            // Použití t=timestamp k vynucení stažení čerstvého souboru z GitHubu
            const response = await fetch('data.csv?t=' + new Date().getTime());
            const data = await response.text();
            
            // Parsování CSV (předpokládá formát: datum,cena,udalost)
            rawData = data.trim().split('\n').map(row => {
                const parts = row.split(',');
                return {
                    t: parts[0] ? parts[0].trim() : '',
                    p: parts[1] ? parseFloat(parts[1]) : 0,
                    e: parts[2] ? parts[2].trim() : ''
                };
            }).filter(item => !isNaN(item.p));

            init();
        } catch (e) {
            console.error("Chyba při načítání dat:", e);
            document.getElementById('last-event-label').innerText = "CHYBA PŘI NAČÍTÁNÍ CSV";
        }
    }

    function init() {
        if (rawData.length === 0) return;

        // Aktuální čas pro hlavičku
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('current-time').innerText = now.toLocaleDateString('cs-CZ', options).toUpperCase();

        // Poslední záznam
        const last = rawData[rawData.length - 1];
        document.getElementById('last-price').innerText = last.p.toLocaleString() + " CZK";
        document.getElementById('last-event-label').innerText = "⚡ POSLEDNÍ AKCE: " + (last.e || "Žádná");

        // Min/Max za posledních 24h
        const last24h = rawData.slice(-12);
        const prices24h = last24h.map(d => d.p);
        document.getElementById('high-24h').innerText = Math.max(...prices24h).toLocaleString() + " CZK";
        document.getElementById('low-24h').innerText = Math.min(...prices24h).toLocaleString() + " CZK";

        updateChart('all');
    }

    function updateChart(range) {
        let filteredData = rawData;
        if (range === '24h') filteredData = rawData.slice(-12);
        if (range === '7d') filteredData = rawData.slice(-84);
        if (range === '30d') filteredData = rawData.slice(-360);

        const labels = filteredData.map(d => d.t);
        const prices = filteredData.map(d => d.p);
        const events = filteredData.map(d => d.e);

        if (chart) chart.destroy();

        const gradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.clientHeight);
        gradient.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
        gradient.addColorStop(0.5, 'rgba(139, 92, 246, 0.2)');
        gradient.addColorStop(1, 'rgba(15, 23, 42, 0)');

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Cena',
                    data: prices,
                    borderColor: '#38bdf8',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#38bdf8',
                    pointBorderWidth: 3,
                    segment: {
                        borderColor: ctx => {
                            if (ctx.p1.raw < ctx.p0.raw) return '#fb7185';
                            return '#4ade80';
                        }
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false }, 
                    tooltip: {
                        backgroundColor: '#111b2d',
                        titleFont: { size: 14, weight: '600' },
                        bodyFont: { size: 16 },
                        padding: 15,
                        cornerRadius: 12,
                        borderColor: 'rgba(56, 189, 248, 0.2)',
                        borderWidth: 1,
                        callbacks: {
                            label: function(context) { 
                                return context.parsed.y.toLocaleString() + ' CZK'; 
                            },
                            afterBody: function(context) {
                                const idx = context[0].dataIndex;
                                return events[idx] ? "\nUDÁLOST: " + events[idx] : "";
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#64748b', maxRotation: 0, autoSkip: true, maxTicksLimit: 12 } },
                    y: { grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#64748b' }, position: 'right' }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        });

        document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + range).classList.add('active');
    }

    // Spuštění po načtení okna
    window.onload = loadCSV;
</script>

</body>
</html>
